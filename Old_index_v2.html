
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
#gr{font-family:'Share Tech Mono',monospace;font-size:15px;line-height:1.6;min-height:620px;display:flex;flex-direction:column;border-radius:8px;overflow:hidden;position:relative;}
#scanline{position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:10;}
#topbar{display:flex;justify-content:space-between;align-items:center;padding:7px 14px;border-bottom:1px solid;font-size:11px;flex-wrap:wrap;gap:6px;}
#titletxt{font-family:'VT323',monospace;font-size:22px;letter-spacing:2px;}
#colorbar{display:flex;gap:5px;align-items:center;}
.tbtn{background:none;border:1px solid;color:inherit;font-family:'Share Tech Mono',monospace;font-size:10px;padding:2px 6px;cursor:pointer;opacity:0.55;transition:opacity 0.15s;}
.tbtn:hover,.tbtn.on{opacity:1;}
#statsbar{display:flex;gap:14px;font-size:12px;}
.si{display:flex;gap:4px;}.sl{opacity:0.6;}
#progwrap{padding:4px 14px;font-size:11px;display:flex;align-items:center;gap:8px;border-bottom:1px solid;opacity:0.75;}
#progtrack{flex:1;height:5px;border:1px solid;overflow:hidden;}
#progfill{height:100%;background:currentColor;width:0%;transition:width 0.5s;}
#out{flex:1;overflow-y:auto;padding:14px;min-height:390px;max-height:430px;}
.ln{margin-bottom:1px;white-space:pre-wrap;word-break:break-word;}
.ln.blank{margin-bottom:9px;}
.ln.sep{opacity:0.3;margin:5px 0;}
.ln.hint{opacity:0.72;}
.ln.ok{}
.ln.player{font-weight:bold;}
#inrow{display:flex;align-items:center;padding:9px 14px;border-top:1px solid;gap:7px;}
#psym{font-size:20px;font-family:'VT323',monospace;}
#ci{flex:1;background:none;border:none;color:inherit;font-family:'Share Tech Mono',monospace;font-size:15px;outline:none;caret-color:currentColor;}
#ci::placeholder{opacity:0.28;}
#mbadge{font-size:10px;border:1px solid;padding:1px 7px;opacity:0.6;letter-spacing:1px;}
</style>

<div id="gr">
  <div id="scanline"></div>
  <div id="topbar">
    <span id="titletxt">ANATOMIA v2.0</span>
    <div id="colorbar">
      <span style="opacity:0.5;font-size:11px;">THEME:</span>
      <button class="tbtn on" onclick="setTheme('green')" data-t="green">PHOSPHOR</button>
      <button class="tbtn" onclick="setTheme('amber')" data-t="amber">AMBER</button>
      <button class="tbtn" onclick="setTheme('dark')" data-t="dark">DARK</button>
      <button class="tbtn" onclick="setTheme('clinical')" data-t="clinical">CLINICAL</button>
    </div>
    <div id="statsbar">
      <div class="si"><span class="sl">SCORE:</span><span id="sv">0</span></div>
      <div class="si"><span class="sl">MODE:</span><span id="mv">—</span></div>
    </div>
  </div>
  <div id="progwrap">

  </div>
  <div id="out"></div>
  <div id="inrow">

    <input id="ci" type="text" placeholder="enter command..." autocomplete="off" autocorrect="off" spellcheck="false"/>
    <span id="mbadge">READY</span>
  </div>
</div>

  document.getElementById('scanline').style.display=n==='clinical'?'none':'block';

}

    'pronator quadratus':{aliases:[],origin:'distal anterior ulna',insertion:'distal anterior radius',action:'pronation of forearm',nerve:'anterior interosseous nerve (C7, C8)'},

    'median nerve':{aliases:[],roots:'C6, C7, C8, T1',from:'lateral and medial cords of brachial plexus',supplies_motor:'most forearm flexors, thenar muscles, lateral two lumbricals',supplies_sensory:'lateral 3.5 digits (palmar and dorsal tips)',branches:['anterior interosseous nerve','palmar cutaneous branch','recurrent (thenar) branch']},

const NONUL={'lower limb':true,'upper limb':false,'leg':true,'thigh':true,'foot':true,'knee':true,'hip':true,'lower extremity':true};
const SYNMAP={'shoulder joint':'glenohumeral joint','shoulder':'glenohumeral joint','elbow joint':'humeroulnar joint','elbow':'humeroulnar joint','wrist joint':'radiocarpal joint','wrist':'radiocarpal joint','rotator cuff':'supraspinatus, infraspinatus, teres minor, subscapularis','biceps':'biceps brachii','triceps':'triceps brachii','collar bone':'clavicle','shoulder blade':'scapula','navicular':'scaphoid'};

let G={
  score:0,mode:null,phase:'intro',region:null,
  puzzleOn:false,
  built:{bones:[],joints:[],muscles:[],nerves:[]},
  pending:null,
  failCount:0,
  revealUsed:false
};

function norm(s){return s.toLowerCase().replace(/[^a-z0-9 ']/g,' ').replace(/\s+/g,' ').trim();}

function findStruct(input){
  const n=norm(input);
  for(const cat of['bones','joints','muscles','nerves']){
    for(const[k,v]of Object.entries(DB[cat])){
      if(norm(k)===n)return{cat,key:k,val:v};
      if(v.aliases&&v.aliases.some(a=>norm(a)===n))return{cat,key:k,val:v};
    }
  }
  return null;
}

function findFeat(input,key,cat){
  const n=norm(input);
  const feats=(DB[cat][key].features||[]);
  for(const f of feats){if(norm(f)===n||norm(f).includes(n)||n.includes(norm(f)))return f;}
  return null;
}

function jointsForBones(bkeys){
  const out=[];
  for(const[jk,jv]of Object.entries(DB.joints)){
    const cs=(jv.connects||[]).map(norm);
    const matched=bkeys.filter(b=>cs.some(c=>c.includes(norm(b))||norm(b).includes(c)));
    if(matched.length>=2||(bkeys.length===2&&matched.length>=1))out.push({key:jk,val:jv});
  }
  return out;
}

function allJointsForTwo(b1,b2){
  const out=[];
  const n1=norm(b1),n2=norm(b2);
  for(const[jk,jv]of Object.entries(DB.joints)){
    const cs=(jv.connects||[]).map(norm);
    const m1=cs.some(c=>c.includes(n1)||n1.includes(c));
    const m2=cs.some(c=>c.includes(n2)||n2.includes(c));
    if(m1&&m2)out.push({key:jk,val:jv});
  }
  return out;
}

function pct(){
  const tot=Object.keys(DB.bones).length+Object.keys(DB.joints).length+Object.keys(DB.muscles).length+Object.keys(DB.nerves).length;
  const done=G.built.bones.length+G.built.joints.length+G.built.muscles.length+G.built.nerves.length;
  return Math.round(done/tot*100);
}

function ui(){
  document.getElementById('sv').textContent=G.score;
  document.getElementById('mv').textContent=G.mode||'—';
  document.getElementById('progfill').style.width=pct()+'%';
  document.getElementById('ppct').textContent=pct()+'%';
  document.getElementById('mbadge').textContent=G.mode?G.mode.toUpperCase():'READY';
}

function out(text,cls){
  const el=document.getElementById('out');
  (text===''?['']:text.split('\n')).forEach(ln=>{
    const d=document.createElement('div');
    d.className='ln '+(ln===''?'blank':(cls||'system'));
    d.textContent=ln===''?' ':ln;
    el.appendChild(d);
  });
  el.scrollTop=el.scrollHeight;
}
function sep(){const el=document.getElementById('out');const d=document.createElement('div');d.className='ln sep';d.textContent='─'.repeat(52);el.appendChild(d);el.scrollTop=el.scrollHeight;}

function handle(raw){
  const t=raw.trim();
  if(!t)return;
  out('> '+t,'player');

  const n=norm(t);

  if(G.pending){
    doPending(n,t);
    ui();return;
  }

  const ci=t.indexOf(',');
  if(ci===-1){freeInput(n,t);ui();return;}

  const cmd=t.substring(0,ci).trim().toLowerCase();
  const args=t.substring(ci+1).trim();

  const CMDS=['help','list','query','describe','examine','identify','join','connect','remove','inventory','status','select','quiz','test','hint','reveal'];
  if(!CMDS.includes(cmd)){out('Command not recognised. Type "help," for a list of available commands.','hint');ui();return;}

  switch(cmd){
    case'help':cmdHelp();break;
    case'list':cmdList(args);break;
    case'query':case'describe':case'examine':case'identify':cmdQuery(args);break;
    case'join':cmdJoin(args);break;
    case'connect':cmdConnect(args);break;
    case'remove':cmdRemove(args);break;
    case'inventory':cmdInventory();break;
    case'status':cmdStatus();break;
    case'select':cmdSelect(args);break;
    case'quiz':case'test':cmdQuiz();break;
    case'hint':doHint();break;
    case'reveal':doReveal();break;
    default:out('Command not recognised.','hint');
  }
  ui();
}

function freeInput(n,raw){
  if(G.phase==='intro'){
    if(n.includes('upper limb')||n.includes('upper extremity')||n==='arm'){
      G.region='upper limb';G.phase='puzzle_ask';
      out('');out('REGION ACCEPTED: Upper Limb.');out('');
      out('Before we begin — would you like clinical case scenarios woven into your reconstruction session?');
      out('These will appear periodically and ask you to diagnose anatomical deficits.');out('');
      out('  yes  — include clinical cases');out('  no   — reconstruction only');
    } else if(NONUL[n]===true){
      out('That region is outside this module\'s scope.','hint');
      out('This system currently supports: upper limb / upper extremity.','hint');
    } else {
      const s=Object.entries(SYNMAP).find(([k])=>n.includes(k));
      if(s){out('"'+raw+'" — did you mean "'+s[1]+'"? Please use precise anatomical terminology.','hint');}
      else{out('Region not recognised. This module covers the upper limb.','hint');out('Try typing: upper limb','hint');}
    }
    return;
  }
  if(G.phase==='puzzle_ask'){
    if(n==='yes'||n==='y'){G.puzzleOn=true;out('');out('Clinical cases enabled. They will appear as the reconstruction progresses.');}
    else{G.puzzleOn=false;out('Reconstruction-only mode selected.');}
    G.phase='mode_select';out('');
    out('Select your operating mode:');out('');
    out('  reconstruct  — rebuild the upper limb through articulation and assembly');
    out('  quiz         — directed question-and-answer on upper limb structures');
    out('');
    return;
  }
  if(G.phase==='mode_select'){
    if(n==='reconstruct'||n==='build'||n==='construction'){startReconstruct();return;}
    if(n==='quiz'||n==='test'){startQuiz();return;}
    out('Please type "reconstruct" or "quiz" to begin.','hint');
    return;
  }
  if(G.phase==='quiz_active'){handleQuizAns(n,raw);return;}
  if(G.phase==='puzzle_active'){handlePuzzleAns(n);return;}

  const found=findStruct(raw);
  if(found){cmdQuery(raw);return;}
  const s=Object.entries(SYNMAP).find(([k])=>n.includes(k));
  if(s){out('Non-standard term detected. Did you mean: '+s[1]+'?','hint');out('Please use precise anatomical terminology.','hint');return;}
  out('Input not understood. Use a command followed by a comma — e.g. "help," or "query, humerus".','hint');
}

function startReconstruct(){
  G.mode='RECONSTRUCT';G.phase='reconstruct';
  out('');out('RECONSTRUCTION MODE');sep();
  out('Your task is to reconstruct the upper limb by articulating its structures.');out('');

}

function startQuiz(){
  G.mode='QUIZ';G.phase='quiz_active';
  G.quizQ=buildQuizQ();G.quizIdx=0;G.failCount=0;G.revealUsed=false;
  out('');out('QUIZ MODE');sep();
  out('Answer questions on upper limb anatomy. Type your answer at the prompt.');
  out('Type "hint," for a clue. Type "reveal" after a failed attempt to see the answer.');
  out('Type "skip," to move on. Type "exit," to return to mode selection.');out('');
  nextQuiz();
}

function buildQuizQ(){
  const qs=[];
  for(const[k,v]of Object.entries(DB.muscles)){
    qs.push({t:'nerve',k,v});qs.push({t:'action',k,v});
    qs.push({t:'origin',k,v});qs.push({t:'insertion',k,v});
  }
  for(const[k,v]of Object.entries(DB.joints)){
    qs.push({t:'jtype',k,v});qs.push({t:'jfeat',k,v});
  }
  for(const[k,v]of Object.entries(DB.nerves)){qs.push({t:'nsupply',k,v});}
  return qs.sort(()=>Math.random()-0.5);
}

function nextQuiz(){
  if(G.quizIdx>=G.quizQ.length){out('');out('All questions answered. Final score: '+G.score);G.phase='mode_select';return;}
  const q=G.quizQ[G.quizIdx];G.quizCurrent=q;G.failCount=0;G.revealUsed=false;
  out('');
  if(q.t==='nerve')out('Which nerve innervates the '+q.k+'?');
  else if(q.t==='action')out('What is the primary action of the '+q.k+'?');
  else if(q.t==='origin')out('Where does the '+q.k+' originate?');
  else if(q.t==='insertion')out('Where does the '+q.k+' insert?');
  else if(q.t==='jtype')out('What type of synovial joint is the '+q.k+'?');
  else if(q.t==='jfeat')out('Name the two articular features that form the '+q.k+'.');
  else if(q.t==='nsupply')out('What structures does the '+q.k+' supply (motor)?');
}

function quizAnswer(q){
  if(q.t==='nerve')return norm(q.v.nerve||'');
  if(q.t==='action')return norm(q.v.action||'');
  if(q.t==='origin')return norm(q.v.origin||'');
  if(q.t==='insertion')return norm(q.v.insertion||'');
  if(q.t==='jtype')return norm(q.v.type||'');
  if(q.t==='jfeat')return norm((q.v.featA||'')+' '+( q.v.featB||''));
  if(q.t==='nsupply')return norm(q.v.supplies_motor||'');
  return '';
}

function handleQuizAns(n,raw){
  const q=G.quizCurrent;if(!q)return;
  if(n==='exit,'){G.phase='mode_select';out('Returning to mode selection.');return;}
  if(n==='skip'||n==='skip,'){
    const ans=quizAnswer(q);
    out('Moving on. For reference: '+displayAns(q),'hint');
    G.quizIdx++;nextQuiz();return;
  }
  if(n==='hint'||n==='hint,'){doHint();return;}
  if(n==='reveal'){doReveal();return;}
  const ans=quizAnswer(q);
  const correct=ans.includes(n.substring(0,Math.min(n.length,12)))||n.includes(ans.split('(')[0].trim().substring(0,10))||ans.split(' ').some(w=>w.length>4&&n.includes(w));
  if(correct){
    out('That is consistent with current anatomical records. +10 points.','ok');
    G.score+=10;G.quizIdx++;nextQuiz();
  } else {
    G.failCount++;
    out('The records do not support that response. Consider the structure\'s regional anatomy and try again.','hint');
    if(G.failCount===1)out('Type "hint," for guidance, or "reveal" to see the answer.','hint');
  }
}

function displayAns(q){
  if(q.t==='nerve')return q.v.nerve;
  if(q.t==='action')return q.v.action;
  if(q.t==='origin')return q.v.origin;
  if(q.t==='insertion')return q.v.insertion;
  if(q.t==='jtype')return q.v.type;
  if(q.t==='jfeat')return (q.v.featA||'?')+' with '+(q.v.featB||'?');
  if(q.t==='nsupply')return q.v.supplies_motor;
  return '—';
}

const PUZZLES=[
  {desc:'A patient presents with loss of shoulder abduction beyond 15 degrees and instability of the glenohumeral joint. The remaining rotator cuff is intact. Identify the damaged muscle.',answer:'supraspinatus',hint:'This muscle travels through the subacromial space and inserts on the superior facet of the greater tubercle.'},
  {desc:'Following a mid-shaft humeral fracture, the patient is unable to extend the wrist or fingers, and has lost sensation over the dorsum of the hand. Identify the injured nerve.',answer:'radial nerve',hint:'This nerve winds around the posterior aspect of the humeral shaft in a groove named after it.'},
  {desc:'A patient presents with a claw hand deformity affecting the medial two digits, and loss of sensation over the medial 1.5 digits. Identify the compromised nerve.',answer:'ulnar nerve',hint:'This nerve passes through a bony groove posterior to the medial epicondyle, and enters the hand through a canal named after a French surgeon.'},
  {desc:'The patient cannot flex the elbow with the forearm supinated, cannot supinate against resistance, and has lost sensation over the lateral forearm. Elbow flexion with a pronated forearm is preserved. Identify the damaged nerve.',answer:'musculocutaneous nerve',hint:'This nerve pierces the coracobrachialis before running between biceps brachii and brachialis.'},
  {desc:'A patient cannot oppose the thumb, has weakness of wrist flexion, and reports numbness over the lateral 3.5 digits. Symptoms worsen at night. Identify the nerve and its likely site of compression.',answer:'median nerve',hint:'This nerve passes through a fibro-osseous tunnel at the wrist, bounded anteriorly by the flexor retinaculum.'}
];

let puzzleIdx=0;
function triggerPuzzle(){

  G.puzzlePhase='puzzle_active';G.puzzlePrev=G.phase;G.phase='puzzle_active';
  G.puzzleCurrent=PUZZLES[puzzleIdx++];G.failCount=0;G.revealUsed=false;
  out('');out('— CLINICAL CASE INTERRUPTION —');sep();
  out(G.puzzleCurrent.desc);out('');

}

function handlePuzzleAns(n){
  const p=G.puzzleCurrent;if(!p)return;
  if(n==='hint'||n==='hint,'){doHint();return;}
  if(n==='reveal'){doReveal();return;}
  const ans=norm(p.answer);
  if(n.includes(ans)||ans.includes(n.split(' ')[0])){
    out('Correct identification. The clinical picture is consistent with '+p.answer+'. +20 points.','ok');
    G.score+=20;G.phase=G.puzzlePrev||'reconstruct';
    out('');out('Returning to reconstruction...');
  } else {
    G.failCount++;
    out('The presentation does not point to that structure. Review the motor and sensory deficits and try again.','hint');
    if(G.failCount===1)out('Type "hint," for a clue, or "reveal" after further consideration.','hint');
  }
}

function doPending(n,raw){
  const p=G.pending;
  if(!p)return;

  if(p.type==='joint_from_list'){
    if(n==='reveal'){
      if(p.failCount===0){out('Consider the bones involved and try at least once before revealing.','hint');return;}
      out('The possible joints between those bones include:','hint');
      p.joints.forEach(j=>out('  — '+j.key,'hint'));
      G.pending=null;return;
    }
    if(n==='hint'||n==='hint,'){
      const j=p.joints[0];
      out('Consider: what type of movement occurs between these bones? The joint\'s name often reflects this.','hint');
      out('One such joint: type "'+j.val.type+'"','hint');
      return;
    }
    const match=p.joints.find(j=>norm(j.key)===n||j.val.aliases&&j.val.aliases.some(a=>norm(a)===n));
    if(match){
      out('');out(match.key.toUpperCase()+' — confirmed between those bones.','ok');
      out('Joint type: '+match.val.type);out('');
      out('To complete this joint, name the articulating feature of each bone:');
      out('  join, [feature] of [bone] with [feature] of [bone]');out('');
      out('Example: join, '+match.val.featA+' of '+match.val.boneA+' with '+match.val.featB+' of '+match.val.boneB);
      G.pending={type:'joint_features',joint:match,failCount:0};
    } else {
      p.failCount=(p.failCount||0)+1;
      out('That joint name is not consistent with the records for those bones.','hint');
      out('Type "hint," for a clue or "reveal" to see the possibilities.','hint');
    }
    return;
  }

  if(p.type==='joint_features'){
    if(n==='reveal'){
      if(p.failCount===0){out('Attempt the articulating features at least once before revealing.','hint');return;}
      const j=p.joint;
      out('The '+j.key+' is formed by:','hint');
      out('  '+j.val.featA+' of the '+j.val.boneA,'hint');
      out('  '+j.val.featB+' of the '+j.val.boneB,'hint');
      G.pending=null;addJoint(p.joint);return;
    }
    if(n==='hint'||n==='hint,'){
      const j=p.joint;
      out('Consider the surface of the '+j.val.boneA+' that contacts the '+j.val.boneB+'.','hint');
      out('Partial: the feature on the '+j.val.boneA+' begins with "'+j.val.featA.substring(0,4)+'..."','hint');
      return;
    }
    parseFeatureJoin(raw,p);
    return;
  }
}

function parseFeatureJoin(raw,p){
  const wIdx=raw.toLowerCase().indexOf(' with ');
  const andIdx=raw.toLowerCase().indexOf(' and ');
  if(wIdx===-1&&andIdx===-1){
    out('Use "with" to join the two articulating features — e.g. "join, trochlea of humerus with trochlear notch of ulna".','hint');
    out('Note: "and" connects a list of bones, while "with" articulates two specific features.','hint');
    p.failCount++;return;
  }
  if(andIdx>-1&&wIdx===-1){
    out('It looks like you used "and" here. When joining specific articulating features, please use "with".','hint');
    out('Example: join, '+p.joint.val.featA+' of '+p.joint.val.boneA+' with '+p.joint.val.featB+' of '+p.joint.val.boneB,'hint');
    p.failCount++;return;
  }

  const afterComma=raw.indexOf(',')>-1?raw.substring(raw.indexOf(',')+1).trim():raw;
  const splitIdx=afterComma.toLowerCase().indexOf(' with ');
  const partA=afterComma.substring(0,splitIdx).trim();
  const partB=afterComma.substring(splitIdx+6).trim();

  const parseOf=(s)=>{
    const oi=s.toLowerCase().indexOf(' of ');
    if(oi>-1)return{feat:s.substring(0,oi).trim(),bone:s.substring(oi+4).trim()};
    return{feat:null,bone:s.trim()};
  };
  const A=parseOf(partA),B=parseOf(partB);
  const j=p.joint;

  const checkFeat=(feat,bone,expectedFeat,expectedBone)=>{
    if(!feat){return{boneOk:norm(bone).includes(norm(expectedBone))||norm(expectedBone).includes(norm(bone)),featOk:false,featMissing:true};}
    return{boneOk:norm(bone).includes(norm(expectedBone))||norm(expectedBone).includes(norm(bone)),featOk:norm(feat).includes(norm(expectedFeat).split(' ')[0])||norm(expectedFeat).includes(norm(feat).split(' ')[0])};
  };

  const r1=checkFeat(A.feat,A.bone,j.val.featA,j.val.boneA);
  const r2=checkFeat(B.feat,B.bone,j.val.featB,j.val.boneB);
  const r1x=checkFeat(A.feat,A.bone,j.val.featB,j.val.boneB);
  const r2x=checkFeat(B.feat,B.bone,j.val.featA,j.val.boneA);

  const fwd=(r1.boneOk&&r1.featOk&&r2.boneOk&&r2.featOk);
  const rev=(r1x.boneOk&&r1x.featOk&&r2x.boneOk&&r2x.featOk);

  if(fwd||rev){
    out('');out('Articulation confirmed.','ok');
    out('  '+j.val.featA+' of '+j.val.boneA);
    out('  '+j.val.featB+' of '+j.val.boneB);
    out('');out(j.key.toUpperCase()+' — successfully reconstructed. +15 points.','ok');
    G.score+=15;G.pending=null;
    addJoint(j);
    if(G.puzzleOn&&G.built.joints.length>0&&G.built.joints.length%3===0){
      setTimeout(()=>{triggerPuzzle();ui();},400);
    }
  } else {
    p.failCount++;
    out('The articulation is not quite right.','hint');
    if(!r1.boneOk&&!r2.boneOk&&!r1x.boneOk)out('One or both bones do not appear to belong to the '+j.key+'.','hint');
    else if(r1.boneOk&&!r1.featOk)out('The feature named for the '+j.val.boneA+' needs reviewing.','hint');
    else if(r2.boneOk&&!r2.featOk)out('The feature named for the '+j.val.boneB+' needs reviewing.','hint');
    else out('Review the specific articular surfaces of each bone.','hint');
    out('Type "hint," for a clue or "reveal" to see the answer.','hint');
  }
}

function addJoint(j){
  if(!G.built.joints.includes(j.key)){
    G.built.joints.push(j.key);
    if(!G.built.bones.includes(j.val.boneA))G.built.bones.push(j.val.boneA);
    if(!G.built.bones.includes(j.val.boneB))G.built.bones.push(j.val.boneB);
  }
}

function cmdJoin(args){
  if(!args){out('Specify structures to join. E.g. "join, humerus and ulna"','hint');return;}

  const wIdx=args.toLowerCase().indexOf(' with ');
  const andIdx=args.toLowerCase().indexOf(' and ');

  if(wIdx>-1){
    if(G.pending&&G.pending.type==='joint_features'){parseFeatureJoin(args,G.pending);return;}
    out('It looks like you\'re specifying articulating features. Please first name the bones using "and", then I\'ll ask for the features.','hint');
    out('Example: join, humerus and ulna','hint');
    return;
  }

  const boneNames=args.split(/\s+and\s+/i).map(s=>s.trim());

  if(boneNames.length===1){
    const found=findStruct(boneNames[0]);
    if(!found){out('"'+boneNames[0]+'" not found. Check spelling or try "list, bones".','hint');return;}
    out('One structure named. To form a joint, at least two bones are needed.','hint');
    out('Example: join, humerus and ulna','hint');
    return;
  }

  if(boneNames.length===2){
    const f1=findStruct(boneNames[0]),f2=findStruct(boneNames[1]);
    if(!f1){out('"'+boneNames[0]+'" not found. Check spelling or try "list, bones".','hint');return;}
    if(!f2){out('"'+boneNames[1]+'" not found. Check spelling or try "list, bones".','hint');return;}
    const joints=allJointsForTwo(f1.key,f2.key);
    if(!joints.length){out('No recorded joint exists between the '+f1.key+' and '+f2.key+'.','hint');out('Review whether these bones are in direct articulation.','hint');return;}
    if(joints.length===1){
      const j=joints[0];
      out('');out('These bones do form a joint. To complete the reconstruction, the articulating features of each bone are needed.','ok');
      out('');out('Name the specific articular surfaces:');
      out('  join, [feature] of [bone] with [feature] of [bone]');out('');
      out('Example: join, '+j.val.featA+' of '+j.val.boneA+' with '+j.val.featB+' of '+j.val.boneB);
      G.pending={type:'joint_features',joint:j,failCount:0};
    } else {
      out('');out('These bones share more than one articulation.','ok');
      out('Which specific joint would you like to reconstruct?');
      out('');joints.forEach(j=>out('  — '+j.key));out('');
      out('Type the joint name to proceed, or "hint," for guidance.');
      G.pending={type:'joint_from_list',joints,bones:[f1.key,f2.key],failCount:0};
    }
    return;
  }

  const found=boneNames.map(b=>findStruct(b)).filter(Boolean);
  const notFound=boneNames.filter(b=>!findStruct(b));
  if(notFound.length){notFound.forEach(b=>out('"'+b+'" not found in records.','hint'));return;}
  const joints=jointsForBones(found.map(f=>f.key));
  if(!joints.length){out('No joints found between that combination of bones.','hint');return;}
  out('');out('The following joints exist within that group:','ok');
  joints.forEach(j=>out('  — '+j.key));out('');
  out('Which joint would you like to reconstruct first? Type the joint name.');
  G.pending={type:'joint_from_list',joints,bones:found.map(f=>f.key),failCount:0};
}

function doHint(){
  if(!G.pending&&G.phase!=='quiz_active'&&G.phase!=='puzzle_active'){out('No active challenge to hint on.','hint');return;}
  if(G.phase==='quiz_active'&&G.quizCurrent){
    const q=G.quizCurrent;
    out('Consider: the '+q.k+' is located in the '+
      (q.k.includes('carpi')||q.k.includes('digitorum')||q.k.includes('pollicis')?'forearm':
       q.k.includes('brachii')||q.k.includes('brachialis')||q.k.includes('brachioradialis')?'arm':
       'shoulder region')+'.','hint');
    if(q.t==='nerve')out('Its nerve originates from the brachial plexus (C'+q.v.nerve.match(/C\d/)?.[0]?.slice(1)+' level).','hint');
    return;
  }
  if(G.phase==='puzzle_active'){out(G.puzzleCurrent.hint,'hint');return;}
  if(G.pending?.type==='joint_features'){
    const j=G.pending.joint;
    out('The '+j.key+' is a '+j.val.type+'.','hint');
    out('The feature on the '+j.val.boneA+' is: '+j.val.featA.substring(0,Math.ceil(j.val.featA.length/2))+'...','hint');
    return;
  }
  if(G.pending?.type==='joint_from_list'){
    out('Consider what type of movement occurs between these bones.','hint');
    return;
  }
}

function doReveal(){
  if(!G.pending&&G.phase!=='quiz_active'&&G.phase!=='puzzle_active'){out('No active challenge to reveal.','hint');return;}
  if(G.phase==='quiz_active'&&G.quizCurrent){
    if(G.failCount===0){out('Consider attempting the answer before revealing it.','hint');return;}
    out('Answer: '+displayAns(G.quizCurrent),'hint');
    G.quizIdx++;G.pending=null;nextQuiz();return;
  }
  if(G.phase==='puzzle_active'){
    if(G.failCount===0){out('Attempt the diagnosis at least once before revealing.','hint');return;}
    out('The structure in question is the '+G.puzzleCurrent.answer+'.','hint');
    G.phase=G.puzzlePrev||'reconstruct';G.pending=null;
    out('');out('Returning to reconstruction...');return;
  }
  if(G.pending?.type==='joint_features'){
    if(G.pending.failCount===0){out('Attempt the articulating features at least once before revealing.','hint');return;}
    const j=G.pending.joint;
    out('The '+j.key+' is formed by:','hint');
    out('  '+j.val.featA+' of the '+j.val.boneA,'hint');
    out('  '+j.val.featB+' of the '+j.val.boneB,'hint');
    G.pending=null;addJoint(j);return;
  }
  if(G.pending?.type==='joint_from_list'){
    if(G.pending.failCount===0){out('Attempt naming the joint at least once before revealing.','hint');return;}
    out('Possible joints:','hint');
    G.pending.joints.forEach(j=>out('  — '+j.key,'hint'));
    G.pending=null;return;
  }
}

function cmdQuery(args){
  if(!args){out('Specify a structure — e.g. "query, humerus"','hint');return;}
  const n=norm(args);
  const syn=SYNMAP[n];
  if(syn){out('The term "'+args+'" is informal or non-specific.','hint');out('Did you mean: '+syn+'? Please use precise anatomical terminology.','hint');return;}
  const found=findStruct(args);
  if(!found){out('"'+args+'" not found in the anatomical database.','hint');out('Try "list, bones" or "list, muscles" to see available structures.','hint');return;}
  const{cat,key,val}=found;
  out('');out('[ '+key.toUpperCase()+' ] — '+cat.toUpperCase());sep();
  if(val.aliases&&val.aliases.length)out('Also known as: '+val.aliases.join(', '));
  if(val.features&&val.features.length)out('Articular/surface features: '+val.features.join('; '));
  if(val.connects)out('Articulates: '+val.connects.join(' — '));
  if(val.type)out('Joint type: '+val.type);
  if(val.origin)out('Origin: '+val.origin);
  if(val.insertion)out('Insertion: '+val.insertion);
  if(val.action)out('Action: '+val.action);
  if(val.nerve)out('Innervation: '+val.nerve);
  if(val.parts)out('Parts: '+val.parts.join(', '));
  if(val.roots)out('Nerve roots: '+val.roots);
  if(val.from)out('Derived from: '+val.from);
  if(val.supplies_motor)out('Motor supply: '+val.supplies_motor);
  if(val.supplies_sensory)out('Sensory supply: '+val.supplies_sensory);
  if(val.branches)out('Branches: '+(Array.isArray(val.branches)?val.branches.join(', '):val.branches));
  if(val.passes_through)out('Passes through: '+val.passes_through);
  if(val.injury)out('Injury note: '+val.injury);
  if(val.continues_as)out('Continues as: '+val.continues_as);
  if(val.trunks)out('Trunks: '+val.trunks);
  if(val.cords)out('Cords: '+val.cords);
  out('');
}

function cmdList(args){
  const n=norm(args);
  const cats={bones:DB.bones,joints:DB.joints,muscles:DB.muscles,nerves:DB.nerves};
  const match=Object.keys(cats).find(k=>n.includes(k));
  if(!match){out('Specify: bones, joints, muscles, or nerves.','hint');return;}
  out('');out(match.toUpperCase()+':');sep();
  Object.keys(cats[match]).forEach(k=>{
    const done=G.built[match].includes(k);
    out('  '+k+(done?'  ✓':''));
  });
}

function cmdConnect(args){
  const n=norm(args);const ti=n.indexOf(' to ');
  if(ti===-1){out('Syntax: connect, [nerve] to [muscle]','hint');return;}
  const nerveStr=args.substring(0,ti).trim();
  const muscStr=args.substring(ti+4).trim();
  const nv=findStruct(nerveStr),mu=findStruct(muscStr);
  if(!nv||nv.cat!=='nerves'){out('"'+nerveStr+'" not found as a nerve.','hint');return;}
  if(!mu||mu.cat!=='muscles'){out('"'+muscStr+'" not found as a muscle.','hint');return;}
  const mnerve=norm(mu.val.nerve||'');
  const nkey=norm(nv.key);
  const ok=mnerve.includes(nkey.split(' ')[0])||nkey.includes(mnerve.split('(')[0].trim().split(' ')[0]);
  if(ok){
    out('Connection confirmed. The '+nv.key+' innervates the '+mu.key+'.','ok');
    out(mu.val.nerve);G.score+=8;out('+8 points');
    if(!G.built.nerves.includes(nv.key))G.built.nerves.push(nv.key);
    if(!G.built.muscles.includes(mu.key))G.built.muscles.push(mu.key);
  } else {
    out('The '+nv.key+' is not the primary nerve supply to the '+mu.key+'.','hint');
    out('Consider the muscle\'s embryological origin and its regional nerve territory.','hint');
    G.score=Math.max(0,G.score-2);
  }
}

function cmdRemove(args){
  if(!args){out('Specify a structure to remove.','hint');return;}
  const found=findStruct(args);
  if(!found){out('"'+args+'" not found.','hint');return;}
  const idx=G.built[found.cat].indexOf(found.key);
  if(idx===-1){out(found.key+' is not currently in the specimen.','hint');return;}
  G.built[found.cat].splice(idx,1);
  out(found.key+' removed from reconstruction.');
}

function cmdInventory(){
  out('');out('RECONSTRUCTION INVENTORY:');sep();
  let any=false;
  for(const cat of['bones','joints','muscles','nerves']){
    if(G.built[cat].length){any=true;out(cat.toUpperCase()+' ('+G.built[cat].length+'):');G.built[cat].forEach(i=>out('  — '+i));}
  }
  if(!any)out('No structures recorded yet.','hint');
  out('');out('Completion: '+pct()+'%  |  Score: '+G.score);
}

function cmdStatus(){
  out('');out('STATUS:');sep();
  out('Region: '+(G.region||'none'));out('Mode: '+(G.mode||'none'));
  out('Clinical cases: '+(G.puzzleOn?'enabled':'disabled'));
  out('Score: '+G.score);out('Completion: '+pct()+'%');
  out('Bones: '+G.built.bones.length+'/'+Object.keys(DB.bones).length);
  out('Joints: '+G.built.joints.length+'/'+Object.keys(DB.joints).length);
  out('Muscles: '+G.built.muscles.length+'/'+Object.keys(DB.muscles).length);
  out('Nerves: '+G.built.nerves.length+'/'+Object.keys(DB.nerves).length);
}

function cmdSelect(args){
  const n=norm(args);
  if(n==='reconstruct'||n==='build'){startReconstruct();return;}
  if(n==='quiz'||n==='test'){startQuiz();return;}
  out('Valid modes: reconstruct, quiz','hint');
}

function cmdQuiz(){startQuiz();}

function cmdHelp(){
  out('');out('COMMAND REFERENCE:');sep();
  out('  help,                               — this reference');
  out('  list, [bones|joints|muscles|nerves] — list available structures');
  out('  join, [bone] and [bone]             — initiate joint reconstruction');
  out('  join, [feat] of [bone] with [feat] of [bone]  — specify articulating features');
  out('  query, [structure]                  — retrieve anatomical data');
  out('  describe, [structure]               — alias for query');
  out('  connect, [nerve] to [muscle]        — link innervation');
  out('  remove, [structure]                 — remove from specimen');
  out('  inventory,                          — view reconstruction so far');
  out('  status,                             — system status and score');
  out('  select, [reconstruct|quiz]          — change mode');
  out('  hint,                               — request a clue on current challenge');
  out('  reveal                              — show answer (after ≥1 failed attempt)');
  out('');
  out('PARSER GRAMMAR:');
  out('  "and"  — lists multiple bones         e.g. humerus and ulna and radius');
  out('  "with" — pairs articulating features  e.g. trochlea of humerus with trochlear notch of ulna');
  out('  "of"   — binds feature to structure   e.g. head of humerus');
  out('  "to"   — directional link             e.g. radial nerve to brachioradialis');
}

document.getElementById('ci').addEventListener('keydown',function(e){
  if(e.key==='Enter'){const v=this.value.trim();if(v){handle(v);this.value='';}}
});

boot();ui();
</script>
